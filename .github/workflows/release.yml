name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_status:
        description: 'Release status'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Update Version
        id: versioning
        run: |
          python .github/scripts/bump_version.py ${{ github.event.inputs.bump_type }} ${{ github.event.inputs.release_status }}
          NEW_VERSION=$(cat VERSION.txt)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Check for tags
        id: tag_check
        run: |
          TAG_COUNT=$(git tag -l | wc -l)
          echo "count=$TAG_COUNT" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        if: steps.tag_check.outputs.count != '0'
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Changelog Fallback
        id: changelog_final
        run: |
          if [ "${{ steps.tag_check.outputs.count }}" == "0" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            echo "changelog=${{ steps.changelog.outputs.changelog }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml custom_components/openwrt/manifest.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git tag v${{ env.NEW_VERSION }}
          git push origin main --tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          body: ${{ steps.changelog_final.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.release_status == 'beta' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Version Bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml custom_components/openwrt/manifest.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push
